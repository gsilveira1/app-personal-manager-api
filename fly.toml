# fly.toml app configuration file generated for app-personal-manager-api on 2026-07-18T18:15:40Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'app-personal-manager-api'
primary_region = 'gru'

[deploy]
  release_command = 'npx prisma migrate deploy'
  seed_command = 'ts-node -r dotenv/config prisma/seed.ts'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
  processes = ['app']
  size = 'shared-cpu-2x'

[env]
  # Non-sensitive runtime config (safe to commit)
  NODE_ENV = "production"
  PORT     = "9090"

[[services]]
  internal_port = 9090
  protocol      = "tcp"

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true    # Redirect all HTTP → HTTPS

  [services.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"   # Time for the app to start before health checks begin
    method       = "GET"
    path         = "/health"
    protocol     = "http"

[checks]

  [checks.alive]
    type     = "tcp"
    interval = "15s"
    timeout  = "2s"
    port     = 9090
