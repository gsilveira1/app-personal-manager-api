# fly.toml — app-personal-manager-api
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy: fly deploy
# Secrets: fly secrets set KEY=value ...

app            = "app-personal-manager-api"  # ← Replace with your actual fly app name
primary_region = "gru"                        # São Paulo — closest to Brazil

[build]
  dockerfile = "dockerfile"

[env]
  # Non-sensitive runtime config (safe to commit)
  NODE_ENV = "production"
  PORT     = "9090"

[[services]]
  internal_port = 9090
  protocol      = "tcp"

  [[services.ports]]
    handlers = ["tls", "http"]
    port     = 443

  [[services.ports]]
    handlers    = ["http"]
    port        = 80
    force_https = true    # Redirect all HTTP → HTTPS

  [services.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"   # Time for the app to start before health checks begin
    method       = "GET"
    path         = "/health"
    protocol     = "http"

[checks]
  [checks.alive]
    type     = "tcp"
    interval = "15s"
    timeout  = "2s"
