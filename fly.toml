# fly.toml app configuration file generated for app-personal-manager-api on 2026-07-18T00:51:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'app-personal-manager-api'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'
  seed_command = 'ts-node -r dotenv/config prisma/seed.ts'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
